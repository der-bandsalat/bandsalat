services:
  bandsalat:
    build: .
    image: bandsalat:latest
    container_name: bandsalat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      PORT: 3000
      NODE_ENV: production
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - bandsalat-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:'+process.env.PORT+'/healthz').then(r=>r.ok?0:process.exit(1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bandsalat-data:
